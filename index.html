<!doctype html>
<!--
  開発者向け保守メモ（2026年4月27日時点 / 2026年5月4日追記）
  このアプリは単一の index.html に画面構造・CSS・JavaScript を集約した静的ツールです。
  HTML は描画先ルートだけを持ち、画面 DOM は render 系関数が innerHTML で再生成します。
  CSS は同一ファイル内のクラス名に強く依存し、JavaScript は data-action / data-form によるイベント委譲で操作を受けます。
  sw.js は BGM 音声だけをキャッシュし、manifest.webmanifest と画像・音声ファイルは PWA 表示と画面素材として参照されます。
  保守時は「保存キー」「日付キー（YYYY-MM-DD のローカル日付）」「data-action 名」「スタンプ種別」と CSS クラスの対応を崩さないでください。
  作業前は 1) render() の画面遷移、2) STORAGE_KEYS と移行処理、3) getVisibleStampHistory() の合成順、4) 該当 CSS クラスを確認してください。
  変更後は最低限、初回ロック解除、ホーム初期表示、カード完了、同日二重記録防止、スタンプ表示、画像切替、履歴書き出し、BGM 再生を確認してください。
-->
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f8f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="西川巧真専用">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- PWA/ホーム画面用の資産参照です。PNG 名や manifest の start_url/scope を変える場合は実配信パスと Service Worker 登録パスも確認してください。 -->
  <link rel="icon" type="image/png" sizes="192x192" href="app-icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="app-icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="app-icon-180.png">
  <link rel="manifest" href="manifest.webmanifest">
  <title>西川巧真専用</title>
  <style>
    /*
      保守メモ: CSS は index.html 内の描画テンプレートと密結合しています。
      クラス名を変える場合は renderShell/renderLock/renderHome/renderStampHistory/showModal 系の文字列も同時に確認してください。
      印刷専用の @media print は現時点ではありません。追加する場合は単一ルート再描画、モーダル固定配置、スクロール領域の高さ指定を必ず確認してください。
    */
    :root {
      /* テーマ色は JS の applyRandomTheme() で起動ごとに上書きされます。変数名はボタン、スタンプ、認証表示で共有しています。 */
      color-scheme: light;
      --bg: #f6f8f7;
      --paper: #ffffff;
      --paper-soft: #f0f5f3;
      --ink: #111817;
      --ink-soft: #41514d;
      --muted: #667672;
      --line: #dbe5e1;
      --line-strong: #c8d6d1;
      --teal: #007a72;
      --teal-dark: #005f59;
            --teal-soft: #dff4f0;
      --teal-grad: #116f55;
      --theme-rgb: 0, 122, 114;
      --theme-soft-rgb: 223, 244, 240;
      --coral: #d9514e;
      --coral-dark: #b93c3a;
      --coral-soft: #fde9e6;
      --gold: #a97b00;
      --gold-soft: #fff5d6;
      --shadow-soft: 0 18px 50px rgba(18, 36, 32, 0.10);
      --shadow-lift: 0 24px 70px rgba(18, 36, 32, 0.17);
      --radius: 8px;
      --tap: 48px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100dvh;
      margin: 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(230, 241, 238, 0.94) 46%, rgba(249, 244, 240, 0.86)),
        var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
      line-height: 1.75;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      min-height: var(--tap);
      border: 0;
      border-radius: var(--radius);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .app {
      /* すべての通常画面は #app 配下に再描画されます。幅を変えるとロック画面、ホーム、カード、カレンダー iframe の全体に波及します。 */
      width: min(100%, 720px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) 16px max(22px, env(safe-area-inset-bottom));
    }

    .view-frame {
      min-height: calc(100dvh - max(14px, env(safe-area-inset-top)) - max(22px, env(safe-area-inset-bottom)));
      animation: viewIn 360ms var(--ease) both;
    }

    .app-header {
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      align-items: center;
      justify-items: center;
      gap: 8px;
      padding: 2px 0 18px;
    }

    .brand {
      min-width: 0;
      text-align: center;
    }

    .brand-kicker {
      margin: 0;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      line-height: 1.35;
    }

    .brand-title {
      margin: 0;
      color: var(--ink);
      font-size: 1.12rem;
      font-weight: 900;
      line-height: 1.35;
    }

    .header-side {
      display: flex;
      justify-content: center;
    }

    .icon-button {
      width: 48px;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(17, 24, 23, 0.08);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      box-shadow: 0 10px 26px rgba(22, 40, 36, 0.08);
      font-weight: 900;
    }

    .icon-button:active,
    .primary-button:active,
    .secondary-button:active,
    .quiet-button:active,
    .danger-button:active {
      transform: translateY(1px);
    }

    .screen {
      display: grid;
      gap: 18px;
    }

    .hero {
      position: relative;
      display: grid;
      gap: 18px;
      overflow: hidden;
      padding: 22px 18px 20px;
      border: 1px solid rgba(17, 24, 23, 0.08);
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.90), rgba(238, 248, 245, 0.92) 56%, rgba(255, 236, 232, 0.62)),
        var(--paper);
      box-shadow: var(--shadow-soft);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(var(--theme-rgb), 0.12), transparent 26%),
        linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.48));
    }

    .hero-content {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 12px;
    }

    .hero-image {
      position: relative;
      z-index: 1;
      width: 100%;
      height: clamp(154px, 34vw, 214px);
      object-fit: cover;
      object-position: center 42%;
      border-radius: var(--radius);
      border: 1px solid rgba(17, 24, 23, 0.08);
      filter: saturate(0.96) contrast(1.02);
    }

    .hero-image.is-family-photo {
      object-position: center 24%;
    }

    .switchable-image {
      /* data-action="toggle-image" と同期する共通画像クラスです。ロック画面とホーム/完了画面の写真を同時に切り替えます。 */
      cursor: pointer;
      transition: transform 160ms var(--ease), filter 160ms var(--ease), opacity 220ms var(--ease);
      touch-action: manipulation;
      will-change: opacity;
    }

    .switchable-image.is-swapping {
      opacity: 0.14;
    }

    .switchable-image:active {
      transform: scale(0.992);
      filter: saturate(1.04) contrast(1.04) brightness(0.98);
    }

    .kicker {
      margin: 0;
      color: var(--teal-dark);
      font-size: 0.78rem;
      font-weight: 900;
      line-height: 1.45;
      text-align: center;
    }

    .page-title {
      margin: 0;
      color: var(--ink);
      font-size: 1.7rem;
      font-weight: 950;
      line-height: 1.28;
      text-align: center;
      text-wrap: balance;
    }

    .lead {
      margin: 0;
      color: var(--ink-soft);
      font-size: 0.98rem;
      line-height: 1.85;
      text-align: center;
      overflow-wrap: anywhere;
      word-break: normal;
      line-break: strict;
    }

    .favorite-quote {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      color: var(--coral-dark);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Klee", "Hiragino Sans", serif;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.45;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .section {
      display: grid;
      gap: 12px;
    }

    .section-title {
      margin: 0;
      color: var(--ink);
      font-size: 1.16rem;
      font-weight: 900;
      line-height: 1.45;
      text-align: center;
    }

    .section-copy {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.8;
      overflow-wrap: anywhere;
      word-break: normal;
      line-break: strict;
    }

    .center {
      text-align: center;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .primary-button,
    .secondary-button,
    .quiet-button,
    .danger-button {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      text-align: center;
      font-weight: 900;
      transition: transform 160ms var(--ease), box-shadow 160ms var(--ease), background-color 160ms var(--ease);
    }

    .primary-button {
      background: linear-gradient(135deg, var(--teal), var(--teal-grad));
      color: #ffffff;
      box-shadow: 0 14px 28px rgba(var(--theme-rgb), 0.24);
    }

    .primary-button:hover {
      box-shadow: 0 16px 36px rgba(var(--theme-rgb), 0.30);
    }

    .secondary-button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
    }

    .settings-action-button {
      border-color: rgba(var(--theme-rgb), 0.18);
      background: linear-gradient(135deg, var(--gold-soft), #f3cf7a);
      color: #6c4a00;
      box-shadow: 0 12px 24px rgba(169, 123, 0, 0.14);
    }

    .settings-action-button:hover {
      box-shadow: 0 15px 30px rgba(169, 123, 0, 0.20);
    }

    .quiet-button {
      background: transparent;
      color: var(--teal-dark);
    }

    .danger-button {
      border: 1px solid #efc7c1;
      background: #fff0ee;
      color: var(--coral-dark);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .lock-layout {
      min-height: calc(100dvh - 36px);
      display: grid;
      align-content: center;
      gap: 18px;
    }

    .lock-panel {
      display: grid;
      gap: 16px;
      padding: 20px 18px;
      border: 1px solid rgba(17, 24, 23, 0.08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.84);
      box-shadow: var(--shadow-lift);
    }

    .lock-visual {
      width: min(100%, 330px);
      height: 196px;
      margin: 0 auto;
      object-fit: cover;
      object-position: center 42%;
      border-radius: var(--radius);
      border: 1px solid rgba(17, 24, 23, 0.08);
      box-shadow: var(--shadow-soft);
    }

    .lock-visual.is-family-photo {
      object-position: center 24%;
    }

    .form-field {
      display: grid;
      gap: 7px;
    }

    .form-field label {
      color: var(--ink);
      font-weight: 900;
      line-height: 1.45;
      text-align: center;
    }

    .form-field input,
    .form-field textarea {
      width: 100%;
      min-height: var(--tap);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      padding: 12px 13px;
      outline: none;
    }

    .form-field textarea {
      min-height: 210px;
      resize: vertical;
      line-height: 1.75;
    }

    .form-field input:focus,
    .form-field textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(var(--theme-rgb), 0.14);
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.65;
    }

    .auth-stage {
      /* 認証は AUTH_SEQUENCE の順番を視覚化する 3 段階表示です。段数を変える場合は AUTH_SEQUENCE とヒント文も合わせて確認してください。 */
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
      padding: 7px 12px;
      border: 1px solid rgba(var(--theme-rgb), 0.16);
      border-radius: 999px;
      background: rgba(var(--theme-soft-rgb), 0.72);
      color: var(--teal-dark);
      font-size: 0.8rem;
      font-weight: 900;
      line-height: 1.4;
      text-align: center;
    }

    .auth-steps {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .auth-step {
      min-height: 54px;
      display: grid;
      place-items: center;
      padding: 8px;
      border: 1px solid rgba(17, 24, 23, 0.08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.66);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
      line-height: 1.35;
      text-align: center;
    }

    .auth-step.is-active {
      border-color: rgba(var(--theme-rgb), 0.22);
      background: rgba(var(--theme-soft-rgb), 0.88);
      color: var(--teal-dark);
      box-shadow: 0 12px 28px rgba(var(--theme-rgb), 0.10);
    }

    .auth-step.is-done {
      border-color: rgba(169, 123, 0, 0.24);
      background: rgba(255, 245, 214, 0.86);
      color: #735200;
    }

    .history-item strong {
      color: var(--ink);
      font-size: 0.98rem;
      line-height: 1.5;
    }

    .history-item span {
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.65;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .choice-card,
    .history-item,
    .summary-item {
      width: 100%;
      display: grid;
      gap: 5px;
      padding: 14px;
      border: 1px solid rgba(17, 24, 23, 0.08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      text-align: left;
      box-shadow: 0 10px 28px rgba(22, 40, 36, 0.07);
    }

    .choice-card {
      min-height: 116px;
      align-content: center;
    }

    .choice-card strong,
    .summary-item strong {
      display: block;
      font-size: 1.02rem;
      line-height: 1.45;
    }

    .choice-card span,
    .summary-item span {
      display: block;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.68;
    }

    .deck-shell {
      min-height: calc(100dvh - 116px);
      display: grid;
      align-content: center;
      gap: 18px;
    }

    .progress-rail {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(17, 24, 23, 0.08);
    }

    .progress-bar {
      width: var(--progress);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--coral));
      transition: width 280ms var(--ease);
    }

    .deck-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 800;
      line-height: 1.45;
    }

    .deck-card {
      display: grid;
      gap: 18px;
      min-height: 360px;
      align-content: center;
      padding: 24px 18px;
      border: 1px solid rgba(17, 24, 23, 0.08);
      border-radius: var(--radius);
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.96), rgba(236, 247, 244, 0.94) 64%, rgba(255, 235, 231, 0.72)),
        var(--paper);
      box-shadow: var(--shadow-lift);
      animation: cardIn 330ms var(--ease) both;
    }

    .deck-card.is-exiting {
      animation: cardOut 170ms ease both;
    }

    .card-type {
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
      padding: 7px 12px;
      border: 1px solid rgba(var(--theme-rgb), 0.18);
      border-radius: 999px;
      background: rgba(var(--theme-soft-rgb), 0.82);
      color: var(--teal-dark);
      font-size: 0.82rem;
      font-weight: 900;
      line-height: 1.4;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .card-text {
      margin: 0;
      color: var(--ink);
      font-size: 1.12rem;
      font-weight: 950;
      line-height: 1.78;
      text-align: center;
      overflow-wrap: break-word;
      word-break: auto;
      line-break: auto;
    }

    .card-note {
      margin: 0;
      color: var(--coral-dark);
      font-size: 0.92rem;
      font-weight: 800;
      line-height: 1.75;
      text-align: center;
      overflow-wrap: break-word;
      word-break: auto;
      line-break: auto;
    }

    .card-prompt {
      margin: 0;
      color: var(--ink-soft);
      font-size: 0.94rem;
      line-height: 1.8;
      text-align: center;
    }

    .completion-mark {
      width: 74px;
      height: 74px;
      display: grid;
      place-items: center;
      margin: 0 auto;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--teal), var(--coral));
      color: #ffffff;
      box-shadow: 0 18px 38px rgba(var(--theme-rgb), 0.22);
      font-size: 1.8rem;
      font-weight: 950;
    }

    .summary-list {
      display: grid;
      gap: 9px;
    }

    .stamp-month-list {
      /* renderStampHistory() が月ごとに生成する外側スクロール領域です。高さを変えるとホーム画面の初期表示量に影響します。 */
      display: grid;
      gap: 14px;
      max-height: 430px;
      overflow-y: auto;
      padding: 2px 2px 8px;
      scrollbar-width: thin;
    }

    .stamp-month-group {
      display: grid;
      gap: 10px;
      padding: 12px 10px 14px;
      border: 1px solid rgba(17, 24, 23, 0.08);
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.78), rgba(236, 242, 240, 0.86)),
        rgba(246, 248, 247, 0.88);
      box-shadow: 0 10px 26px rgba(22, 40, 36, 0.07);
    }

    .stamp-month-title {
      margin: 0;
      color: var(--ink-soft);
      font-size: 0.84rem;
      font-weight: 900;
      line-height: 1.35;
      text-align: left;
    }

    .stamp-month-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 13px;
      border: 1px solid rgba(17, 24, 23, 0.08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.74);
      color: var(--ink);
      box-shadow: 0 8px 20px rgba(22, 40, 36, 0.06);
      font-size: 0.92rem;
      font-weight: 900;
      line-height: 1.35;
    }

    .stamp-month-button::after {
      content: "開く";
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
    }

    .stamp-month-group .stamp-grid {
      max-height: none;
      overflow: visible;
      padding: 0;
    }

    .stamp-grid {
      /* スタンプは 88px の正方形を前提に、specialStamps の tone/shape と renderStampHistory() の kind で見た目を切り替えます。 */
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      grid-auto-flow: dense;
      gap: 12px;
      align-items: start;
      max-height: 360px;
      overflow-y: auto;
      padding: 2px 2px 8px;
      scrollbar-width: thin;
    }

    .stamp {
      position: relative;
      width: 88px;
      aspect-ratio: 1;
      display: inline-grid;
      place-items: center;
      justify-self: center;
      border-radius: 50%;
      border: 1px solid rgba(17, 24, 23, 0.10);
      background: #e3e7e5;
      color: #5f6966;
      box-shadow: inset 0 0 0 5px rgba(255, 255, 255, 0.38), 0 12px 28px rgba(22, 40, 36, 0.09);
      overflow: hidden;
      text-align: center;
      line-height: 1.2;
    }

    .stamp-inner {
      position: relative;
      z-index: 1;
      display: grid;
      width: 100%;
      height: 100%;
      padding: 9px 7px;
      justify-items: center;
      align-content: center;
    }

    .stamp-inner.is-regular {
      row-gap: 4px;
    }

    .stamp-inner.is-warning {

<body>
  <!-- #app は通常画面の唯一の描画先です。認証前後の画面も含め、render 系関数がこの中身を丸ごと差し替えます。 -->
  <div id="app" class="app" aria-live="polite"></div>
  <!-- #modalRoot は確認・解禁日・長文タイプライターの共有モーダル領域です。通常画面の DOM とは分離して保ちます。 -->
  <div id="modalRoot" class="modal-root" role="presentation"></div>
  <!-- #fxRoot はタップ演出だけを受け持つ固定レイヤーです。UI 操作を遮らないことが不変条件です。 -->
  <div id="fxRoot" class="fx-root" aria-hidden="true"></div>
  <!-- bgm.mp3 は autoplay だけに頼らず initBgm() と sw.js のキャッシュで再生安定性を補っています。 -->
  <audio id="bgm" src="bgm.mp3" autoplay loop preload="auto"></audio>

    <script>
    /*
      JavaScript 保守メモ:
      - state.view と render() が画面遷移の中心です。各画面は #app の innerHTML 差し替えで再生成されます。
      - クリック操作は末尾の app.addEventListener("click", ...) に集約されています。新しいボタンは data-action を追加し、同じ名前を分岐に追加してください。
      - localStorage のキー名と dateKey の形式は既存ユーザーの保存データ互換に直結します。変更する場合は移行処理を先に用意してください。
      - スタンプ表示は履歴、既定スタンプ、特別スタンプ、解禁日スタンプを getVisibleStampHistory() で合成します。片方だけ直すと表示順や重複判定が崩れます。
    */
    const THEMES = [
      { main: "#007a72", dark: "#005f59", soft: "#dff4f0", grad: "#116f55", rgb: "0, 122, 114", softRgb: "223, 244, 240" },
      { main: "#d32f2f", dark: "#9a0007", soft: "#ffebee", grad: "#b71c1c", rgb: "211, 47, 47", softRgb: "255, 235, 238" },
      { main: "#1976d2", dark: "#004ba0", soft: "#e3f2fd", grad: "#0d47a1", rgb: "25, 118, 210", softRgb: "227, 242, 253" },
      { main: "#f57c00", dark: "#e65100", soft: "#fff3e0", grad: "#ef6c00", rgb: "245, 124, 0", softRgb: "255, 243, 224" },
      { main: "#7b1fa2", dark: "#4a0072", soft: "#f3e5f5", grad: "#6a1b9a", rgb: "123, 31, 162", softRgb: "243, 229, 245" },
      { main: "#c2185b", dark: "#8c0032", soft: "#fce4ec", grad: "#ad1457", rgb: "194, 24, 91", softRgb: "252, 228, 236" }
    ];
    const applyRandomTheme = function() {
      /* 起動ごとの視覚変化だけを担います。保存していないため、テーマ色を仕様化する場合は state/localStorage の扱いを新設する必要があります。 */
      const theme = THEMES[Math.floor(Math.random() * THEMES.length)];
      const root = document.documentElement;
      root.style.setProperty('--teal', theme.main);
      root.style.setProperty('--teal-dark', theme.dark);
      root.style.setProperty('--teal-soft', theme.soft);
      root.style.setProperty('--teal-grad', theme.grad);
      root.style.setProperty('--theme-rgb', theme.rgb);
      root.style.setProperty('--theme-soft-rgb', theme.softRgb);
    };
    applyRandomTheme();
    const initBgm = function() {
      /* ブラウザの自動再生制限を避けるため、初回表示・入力・フォーカス復帰で再生を試みます。bgm.mp3 のキャッシュは sw.js 側です。 */
      const bgm = document.getElementById('bgm');
      if (!bgm) return;
      
      const targetVolume = 0.5;
      bgm.volume = 0;

      const fadeIn = () => {
        let currentVol = 0;
        const interval = setInterval(() => {
          currentVol += 0.05;
          if (currentVol >= targetVolume) {
            bgm.volume = targetVolume;
            clearInterval(interval);
          } else {
            bgm.volume = Math.min(targetVolume, currentVol);
          }
        }, 120);
      };

      const attemptPlay = () => {
        if (!bgm.paused) return;
        bgm.play().then(() => {
          fadeIn();
          window.removeEventListener('pointerdown', attemptPlay);
          window.removeEventListener('touchstart', attemptPlay);
          window.removeEventListener('keydown', attemptPlay);
          window.removeEventListener('focus', attemptPlay);
        }).catch(() => {});
      };

      attemptPlay();
      window.addEventListener('pointerdown', attemptPlay, { once: true });
      window.addEventListener('touchstart', attemptPlay, { once: true });
      window.addEventListener('keydown', attemptPlay, { once: true });
      window.addEventListener('focus', attemptPlay);
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') attemptPlay();
      });
    };
    document.addEventListener('DOMContentLoaded', initBgm);
    // 初期実行。DOMContentLoaded 前後のどちらでも BGM 再生を試すため、initBgm() は内部で要素存在を確認します。
    initBgm();

    // サービスワーカーを登録してBGMをキャッシュする。sw.js は bgm.mp3 以外を横取りしない設計です。
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').catch(function(){});
      });
    }

    // 認証・外部リンク・解禁日の仕様値。AUTH_SEQUENCE は順番一致が前提で、ローカル端末に認証済みフラグを保存します。
    const AUTH_SEQUENCE = ["0418", "0429", "0415"];
    const CALENDAR_URL = "https://tatsuko0429.github.io/yome-senyo-tool/";
    const CHEAT_DAY_URL = "https://www.notion.so/35287ce6d69280f5b9def969f515f810?source=copy_link";
    const BGM_VIDEO_URL = "https://www.icloud.com/sharedalbum/#B235nhQSTidALJe";
    const CHEAT_DAY_ORIGIN_KEY = "2026-04-30";

    async function toggleFocusImage() {

      if (state.imageTransitioning) return;

      const images = getSwitchableImages();
      const nextIndex = (state.imageIndex + 1) % focusImages.length;
      state.imageTransitioning = true;

      if (!reduceMotion && images.length > 0) {
        images.forEach((image) => {
          if (image.classList && typeof image.classList.add === "function") {
            image.classList.add("is-swapping");
          }
        });
        await wait(170);
      }

      state.imageIndex = nextIndex;
      localStorage.setItem(STORAGE_KEYS.imageIndex, String(state.imageIndex));
      syncRenderedFocusImages();

      if (!reduceMotion && images.length > 0) {
        images.forEach((image) => {
          void image.offsetWidth;
          if (image.classList && typeof image.classList.remove === "function") {

      const AudioCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtor) return null;
      if (!audioContext) {
        audioContext = new AudioCtor();
      }
      if (audioContext.state === "suspended") {

      }
      return audioContext;

    function playTapSound() {
      const context = getAudioContext();
      if (!context) return;

      const now = context.currentTime;
      const carrier = context.createOscillator();
      const accent = context.createOscillator();
      const gain = context.createGain();

      carrier.type = "triangle";
      accent.type = "sine";
      carrier.frequency.setValueAtTime(760, now);
      carrier.frequency.exponentialRampToValueAtTime(430, now + 0.08);
      accent.frequency.setValueAtTime(1180, now);
      accent.frequency.exponentialRampToValueAtTime(690, now + 0.06);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.028, now + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.095);

      carrier.connect(gain);
      accent.connect(gain);
      gain.connect(context.destination);

      carrier.start(now);
      accent.start(now);
      carrier.stop(now + 0.1);
      accent.stop(now + 0.08);
    }

    function createTapBurst(x, y) {
      if (!fxRoot || typeof document.createElement !== "function") return;

      const burst = document.createElement("div");
      burst.className = "tap-burst";
      burst.style.setProperty("--x", `${x}px`);
      burst.style.setProperty("--y", `${y}px`);

      const ring = document.createElement("span");
      ring.className = "tap-ring";
      burst.appendChild(ring);

      const core = document.createElement("span");
      core.className = "tap-core";
      burst.appendChild(core);

      const vectors = [
        { x: 24, y: -18, delay: 0 },
        { x: -26, y: -14, delay: 24 },
        { x: 18, y: 22, delay: 18 },
        { x: -20, y: 24, delay: 40 },
        { x: 0, y: -30, delay: 12 }
      ];

      vectors.forEach((vector) => {
        const dot = document.createElement("span");
        dot.className = "tap-dot";
        dot.style.setProperty("--dx", `${vector.x}px`);
        dot.style.setProperty("--dy", `${vector.y}px`);
        dot.style.setProperty("--delay", `${vector.delay}ms`);
        burst.appendChild(dot);
      });

      if (typeof fxRoot.appendChild === "function") {
        fxRoot.appendChild(burst);
        window.setTimeout(() => {
          if (typeof burst.remove === "function") burst.remove();
        }, 560);
      }
    }

    function getRecordDateKey(record) {
      // dateKey は日次重複判定の主キーです。古い履歴は completedAt からローカル日付で補完します。
      return record.dateKey || dateKeyFromISO(record.completedAt);

    function getDailyHistory() {
      // 同じ dateKey の複数履歴は、その日の最初の実施だけを代表にします。継続日数・スタンプ・当日完了判定がこの結果を共有します。
      const dailyRecords = new Map();
      getHistory().forEach((record) => {
        if (!record || !record.completedAt) return;
        const key = getRecordDateKey(record);
        const current = dailyRecords.get(key);
        const recordTime = new Date(record.completedAt).getTime();
        const currentTime = current ? new Date(current.completedAt).getTime() : Infinity;
        if (!current || recordTime < currentTime) {
          dailyRecords.set(key, record);
        }
      });

      return [...dailyRecords.values()].sort((a, b) => {
        const keyDiff = getRecordDateKey(b).localeCompare(getRecordDateKey(a));
        if (keyDiff !== 0) return keyDiff;
        return new Date(a.completedAt) - new Date(b.completedAt);
      });
    }

    function getCheatDayOriginKey(dateKey) {
      return specialStamps.reduce((originKey, stamp) => {

        const resetKeys = stamp.dateKeys || [stamp.dateKey];
        return resetKeys.reduce((currentOrigin, resetKey) => {
          if (!resetKey || daysBetweenKeys(resetKey, dateKey) < 0) return currentOrigin;
          return daysBetweenKeys(currentOrigin, resetKey) > 0 ? resetKey : currentOrigin;
        }, originKey);
      }, CHEAT_DAY_ORIGIN_KEY);
    }

    function isCheatDay(dateKey = todayKey()) {
      // 解禁日は基準日から 5 日ごとです。失敗スタンプが resetsCheatDay を持つ場合は、その日を起点に再計算します。
      const originKey = getCheatDayOriginKey(dateKey);
      const daysFromOrigin = daysBetweenKeys(originKey, dateKey);
      return daysFromOrigin >= CHEAT_DAY_INTERVAL_DAYS && daysFromOrigin % CHEAT_DAY_INTERVAL_DAYS === 0;
    }

      const dailyHistory = getDailyHistory();

          let correctionLabel = item.correctionLabel || (isCorrection ? "修正記入" : "");
          let metaLabel = "";
          
          if (isCorrection && item.correctionMark === "×" && correctionLabel.startsWith("自慰") && correctionLabel.endsWith("回")) {
            correctionLabel = "自慰";
            metaLabel = item.correctionLabel.substring(2);
          }

          return {
            id: item.id,
            kind: isCorrection ? "correction" : "regular",
            dateKey: getRecordDateKey(item),
            completedAt: item.completedAt,
            mark: item.correctionMark || "",
            label: correctionLabel,
            metaLabel: metaLabel,
            subLabel: "",
            subTone: "",
            tone: item.correctionTone || "",
            title: isCorrection ? `${item.dateKey} ${item.correctionLabel || "前日修正"}` : formatDate(item.completedAt)
          };
        });

      const defaultItems = defaultRegularStamps
        .filter((stamp) => !historyKeys.has(stamp.dateKey) && !specialKeys.has(stamp.dateKey) && !isCheatDay(stamp.dateKey))
        .map((stamp) => ({
          kind: "default",
          dateKey: stamp.dateKey,
          title: stamp.title
        }));

      const warningItems = specialStamps.map((stamp) => ({
        kind: "warning",
        id: stamp.id,
        dateKey: stamp.dateKey,
        mark: stamp.mark,
        label: stamp.label,
        metaLabel: stamp.metaLabel || "",
        subLabel: stamp.subLabel || "",
        subTone: stamp.subTone || "",
        tone: stamp.tone || "warning",
        shape: stamp.shape || "",
        dateLabel: stamp.dateLabel || "",
        title: stamp.title,
        message: stamp.message || "",
        memo: stamp.memo || "",
        memoTone: stamp.memoTone || ""
      }));

      const cheatItems = getCheatDayStamps(dailyHistory);
      const kindOrder = { warning: 0, cheat: 1, correction: 2, regular: 3, default: 4 };

      return [...regularItems, ...defaultItems, ...warningItems, ...cheatItems].sort((a, b) => {
        const keyDiff = b.dateKey.localeCompare(a.dateKey);
        if (keyDiff !== 0) return keyDiff;
        if (a.kind !== b.kind) return (kindOrder[a.kind] ?? 9) - (kindOrder[b.kind] ?? 9);
        return 0;
      });
    }

    function hasCompletedMindsetToday() {
      // ホームの主ボタンを「マインドセット」から「カレンダーを開く」へ切り替える判定です。日付境界は todayKey() に依存します。
      const key = todayKey();
      return getDailyHistory().some((item) => {
        return getRecordDateKey(item) === key && isCompletionHistoryRecord(item);
      });
    }

    function addHistory(cards) {
      // 1 日 1 件だけ保存する不変条件です。完了画面に進んでも同日二重実行では履歴を増やしません。
      const history = getHistory();
      const key = todayKey();
      const alreadyRecorded = history.some((item) => getRecordDateKey(item) === key);
      if (alreadyRecorded) return;

      history.unshift({
        id: `${Date.now()}-mindset`,
        mode: "マインドセット",
        count: cards.length,
        completedAt: new Date().toISOString(),
        dateKey: key,
        cards: cards.map((card) => ({ type: card.type, text: card.text, note: card.note || "" }))
      });
      saveJSON(STORAGE_KEYS.history, history.slice(0, 180));
    }

    function escapeHTML(value) {
      // innerHTML テンプレートへ差し込む値は原則ここを通します。formatMultilineText と typewriter 以外で生 HTML を増やさないでください。
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatMultilineText(value) {
      return escapeHTML(value).replaceAll("\n", "<br>");
    }

    function formatDate(isoString, style = "short") {
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return "日時不明";
      const options = style === "date"
        ? { month: "long", day: "numeric", weekday: "short" }
        : { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" };
      return new Intl.DateTimeFormat("ja-JP", options).format(date);
    }

    function todayKey() {
      // アプリ内の日付はブラウザのローカルタイムゾーン基準です。UTC 変換へ変えると当日判定・継続日数・解禁日がずれます。
      const now = new Date();
      return makeDateKey(now);
    }

    function dateKeyFromISO(isoString) {
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return todayKey();
      return makeDateKey(date);
    }

    function makeDateKey(date) {
      // dateKey は YYYY-MM-DD 固定です。文字列ソートで新しい日付が先に来る前提が複数箇所にあります。
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function dateKeyToDate(key) {
      const [year, month, day] = key.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function addDaysToKey(key, amount) {
      const date = dateKeyToDate(key);
      date.setDate(date.getDate() + amount);
      return makeDateKey(date);
    }

    function daysBetweenKeys(fromKey, toKey) {
      // 日付キー同士の差分専用です。時刻つき Date を渡すと DST や時差で意図しない丸めが起きます。
      const from = dateKeyToDate(fromKey);
      const to = dateKeyToDate(toKey);
      return Math.round((to - from) / 86400000);
    }

    function getCurrentStreakKeys(history) {
      // 現在継続中の stamp を強調するためのキー集合です。今日または昨日が最新でない場合は継続扱いにしません。
      const uniqueKeys = [...new Set(history.map(getRecordDateKey))]
        .filter(Boolean)
        .sort()
        .reverse();

      if (uniqueKeys.length === 0) return new Set();

      const firstKey = uniqueKeys[0];
      const gapFromToday = daysBetweenKeys(firstKey, todayKey());
      if (gapFromToday > 1) return new Set();

      const streak = new Set([firstKey]);
      let expected = firstKey;
      for (let index = 1; index < uniqueKeys.length; index += 1) {
        expected = addDaysToKey(expected, -1);
        if (uniqueKeys[index] !== expected) break;
        streak.add(uniqueKeys[index]);
      }
      return streak;
    }

    function formatStampYear(date) {
      const year = date.getFullYear();
      if (year >= 2019) return `令和${year - 2018}年`;
      return `${year}年`;
    }

    function getStampDateParts(date) {
      if (Number.isNaN(date.getTime())) {
        return { year: "年不明", date: "--/--" };
      }

      return {
        year: formatStampYear(date),
        date: new Intl.DateTimeFormat("ja-JP", {
          month: "numeric",
          day: "numeric"
        }).format(date)
      };
    }

    function formatStampDate(isoString) {
      const date = new Date(isoString);
      return getStampDateParts(date);
    }

    function formatStampDateKey(dateKey) {
      const date = dateKeyToDate(dateKey);
      return getStampDateParts(date);
    }

    function getStampMonthKey(dateKey) {
      // 月別グループ化は dateKey 文字列の先頭 7 桁に依存します。dateKey 形式を変える場合はここも更新してください。
      const value = String(dateKey || "");
      return /^\d{4}-\d{2}/.test(value) ? value.slice(0, 7) : "unknown";
    }

    function formatStampMonthLabel(monthKey) {
      const [year, month] = String(monthKey || "").split("-").map(Number);
      if (!Number.isInteger(year) || !Number.isInteger(month)) return "月不明";
      return `${year}年${month}月`;
    }

    function hasAnyStampForDate(dateKey) {
      if (getSpecialStampKeys().has(dateKey)) return true;
      if (defaultRegularStamps.some((stamp) => stamp.dateKey === dateKey)) return true;
      return getDailyHistory().some((item) => getRecordDateKey(item) === dateKey);
    }

    function formatStampTime(isoString) {
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return "--:--";
      return new Intl.DateTimeFormat("ja-JP", {
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function renderStampHistory() {
      // ホームの「最近の記録」全体を返します。CSS の stamp-month-list/stamp-grid/stamp tone とセットで保守してください。
      const history = getVisibleStampHistory();
      if (history.length === 0) {
        return `<div class="empty-state">記録はまだありません。</div>`;
      }

      const streakKeys = getCurrentStreakKeys(getDailyHistory().filter(isCompletionHistoryRecord));
      const currentMonthKey = getStampMonthKey(todayKey());
      const monthGroups = [];
      const monthMap = new Map();
      history.forEach((item) => {
        const monthKey = getStampMonthKey(item.dateKey);
        if (!monthMap.has(monthKey)) {
          const group = { monthKey, items: [] };
          monthMap.set(monthKey, group);
          monthGroups.push(group);
        }
        monthMap.get(monthKey).items.push(item);
      });

      const renderStampItem = (item) => {
        // kind によって日付・時刻・ラベルの出し分けをしています。default は見た目だけの既定スタンプなので時刻を表示しません。
        const isWarning = item.kind === "warning";
        const isCheat = item.kind === "cheat";
        const isDefault = item.kind === "default";
        const isCorrection = item.kind === "correction";
        const isCrossCorrection = isCorrection && item.mark === "×";
        const usesDateKey = isWarning || isCheat || isDefault || isCorrection;
        const isCurrent = !isWarning && !isCheat && !isDefault && !isCrossCorrection && streakKeys.has(item.dateKey);
        const toneClass = isWarning ? ` is-${item.tone || "warning"}` : isCheat ? " is-cheat" : isCorrection && item.tone ? ` is-${escapeHTML(item.tone)}` : "";
        const shapeClass = item.shape ? ` is-${escapeHTML(item.shape)}` : "";
        const isEditable = !isWarning && !isCheat && !isDefault && !isCrossCorrection;
        const clickableClass = (isWarning && item.message) ? " is-clickable" : isEditable ? " is-editable-stamp" : "";
        const actionAttr = (isWarning && item.message) ? ` data-action="show-special-message" data-id="${escapeHTML(item.id || item.dateKey)}"` : isEditable ? ` data-editable-id="${escapeHTML(item.id || '')}"` : "";
        const dateParts = usesDateKey ? formatStampDateKey(item.dateKey) : formatStampDate(item.completedAt);
        const dateLabel = item.dateLabel || dateParts.date;
        const subLabelClass = item.subLabel
          ? `${item.subTone ? ` is-${escapeHTML(item.subTone)}` : ""}${item.subLabel === "次 死刑" ? " is-pulse" : ""}`
          : " is-placeholder";
        const memoClass = item.memoTone ? ` is-${escapeHTML(item.memoTone)}` : "";
        const warningContent = `<span class="stamp-mark">${escapeHTML(item.mark)}</span><span class="stamp-label-line"><span class="stamp-label">${escapeHTML(item.label)}</span>${item.metaLabel ? `<span class="stamp-label-meta">${escapeHTML(item.metaLabel)}</span>` : ""}</span><span class="stamp-sub-label${subLabelClass}"${item.subLabel ? "" : ' aria-hidden="true"'}>${escapeHTML(item.subLabel || "")}</span>${item.memo ? `<span class="stamp-note${memoClass}">${escapeHTML(item.memo)}</span>` : ""}`;
        const cheatContent = `<span class="stamp-cheat-mark">${escapeHTML(item.mark)}</span><span class="stamp-cheat-label">${escapeHTML(item.label)}</span>`;
        const correctionContent = `${item.mark ? `<span class="stamp-mark">${escapeHTML(item.mark)}</span>` : ""}<span class="stamp-label">${escapeHTML(item.label)}</span>`;
        return `
          <div class="stamp${isCurrent ? " is-current" : ""}${toneClass}${shapeClass}${clickableClass}" title="${escapeHTML(item.title)}"${actionAttr}>
            <span class="stamp-inner ${isCheat ? "is-cheat" : (isWarning || isCrossCorrection) ? "is-warning" : "is-regular"}">
              <span class="stamp-year">${escapeHTML(dateParts.year)}</span>
              <span class="stamp-date">${escapeHTML(dateLabel)}</span>
              ${isCheat ? cheatContent : (isWarning || isCrossCorrection) ? warningContent : isCorrection ? correctionContent : isDefault ? "" : `<span class="stamp-time">${escapeHTML(formatStampTime(item.completedAt))}</span>`}
            </span>
          </div>
        `;
      };

      return `
        <div class="stamp-month-list" aria-label="記録スタンプ">
          ${monthGroups.map((group) => `
            <section class="stamp-month-group" aria-label="${escapeHTML(formatStampMonthLabel(group.monthKey))}">
              ${group.monthKey === currentMonthKey || state.expandedStampMonths.has(group.monthKey)
                ? `<h3 class="stamp-month-title">${escapeHTML(formatStampMonthLabel(group.monthKey))}</h3><div class="stamp-grid">${group.items.map(renderStampItem).join("")}</div>`
                : `<button class="stamp-month-button" type="button" data-action="expand-stamp-month" data-month="${escapeHTML(group.monthKey)}">${escapeHTML(formatStampMonthLabel(group.monthKey))}</button>`}
            </section>
          `).join("")}
        </div>
      `;
    }

    function wait(ms) {
      if (reduceMotion) return Promise.resolve();
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function backupData() {
      // データ削除やファイル保存ではなく、履歴テキストをクリップボードへ書き出すだけです。保存対象は getHistory() の実履歴に限定します。
      const history = getHistory();
      if (history.length === 0) {
        showModal("記録なし", "保存されているスタンプの履歴がありません。");
        return;
      }

      let logText = "【マインドセット実施記録】\n";
      logText += "--------------------------\n";

      // 履歴を日付順（古い順）にして整形
      [...history].reverse().forEach(item => {
        const date = new Date(item.completedAt);
        const dateStr = new Intl.DateTimeFormat("ja-JP", {
          year: "numeric", month: "2-digit", day: "2-digit",
          hour: "2-digit", minute: "2-digit", weekday: "short"
        }).format(date);
        logText += `${dateStr} - ${item.mode || "完了"}\n`;
      });

      logText += "--------------------------\n";
      logText += `出力日: ${new Date().toLocaleString("ja-JP")}`;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(logText).then(() => {
          showModal("コピー完了", "スタンプの履歴をテキスト形式でコピーしました。メモ帳などに貼り付けて保存してください。");
        }).catch(() => {
          showModal("エラー", "コピーに失敗しました。");
        });
      } else {
        showModal("スタンプ履歴", "以下のテキストをコピーしてください。\n\n" + logText);
      }
    }
    function calculateStreak() {
      // ヘッダー表示用の継続日数です。特別スタンプは実施履歴ではないため除外します。
      const history = getDailyHistory().filter((item) => !getSpecialStampKeys().has(getRecordDateKey(item)) && isCompletionHistoryRecord(item));
      if (history.length === 0) return 0;

      const uniqueKeys = [...new Set(history.map(getRecordDateKey))].sort().reverse();
      const today = todayKey();
      const lastKey = uniqueKeys[0];
      
      const gap = daysBetweenKeys(lastKey, today);
      if (gap > 1) return 0; // 2日以上空いたらリセット

      let streak = 1;
      let current = lastKey;
      for (let i = 1; i < uniqueKeys.length; i++) {
        const prev = addDaysToKey(current, -1);
        if (uniqueKeys[i] === prev) {
          streak++;
          current = prev;
        } else {
          break;
        }
      }
      return streak;
    }

    function render() {
      // 画面描画の唯一の入口です。認証前は state.view に関係なくロック画面を表示します。
      if (!state.authenticated) {
        renderLock();
        return;
      }

      if (state.view === "home") renderHome();
      if (state.view === "deck") renderDeck();
      if (state.view === "complete") renderComplete();
      if (state.view === "calendar") renderCalendar();
      if (state.view === "settings") renderSettings();
    }

            <h2 class="page-title">罪を償え。</h2>
          </div>
          <img class="hero-image switchable-image${getFocusImageClass()}" src="${getFocusImage()}" alt="切り替え可能な写真" data-action="toggle-image">
        </section>
        <section class="section">
          <h2 class="section-title">確認したこと</h2>
          <div class="summary-list">${summary}</div>
        </section>
      `);
    }

    function renderCalendar() {
      // 外部カレンダーをアプリ内 iframe に閉じ込める画面です。別タブ遷移に変える場合はホーム主ボタンの期待動作も確認してください。
      renderShell(`
        <section class="calendar-shell">
          <button class="secondary-button" type="button" data-action="go" data-view="home">戻る</button>
          <iframe class="calendar-frame" src="${escapeHTML(CALENDAR_URL)}" title="カレンダー"></iframe>
        </section>
      `);
    }

    async function moveCard(direction) {
      // カード遷移中の連打を state.transitioning で止めます。アニメーション時間は .deck-card.is-exiting と合わせて調整してください。
      if (state.transitioning) return;
      const deck = getDeck();
      const nextIndex = state.activeIndex + direction;
      if (nextIndex < 0 || nextIndex >= deck.length) return;
      state.transitioning = true;
      const cardNode = app.querySelector("#deckCard");
      if (cardNode) cardNode.classList.add("is-exiting");
      await wait(170);
      state.activeIndex = nextIndex;
      state.transitioning = false;
      renderDeck();
    }

    async function confirmCard() {
      // 最後のカード確認時だけ履歴を追加し完了画面へ遷移します。途中カードでは保存しないため、中断は履歴に残りません。
      if (state.transitioning) return;
      const deck = getDeck();
      const card = deck[state.activeIndex];
      if (card) {
        state.confirmedCards[state.activeIndex] = card;
      }

      if (state.activeIndex + 1 >= deck.length) {
        state.transitioning = true;
        const cardNode = app.querySelector("#deckCard");
        if (cardNode) cardNode.classList.add("is-exiting");
        await wait(170);
        state.confirmedCards = deck.slice();
        addHistory(state.confirmedCards);
        state.view = "complete";
        state.transitioning = false;
        render();
        await showPostMindsetMessage();
        return;
      }

      await moveCard(1);
    }

    function startRun() {
      // 新しい実行を始める入口です。前回の一時状態を消してから deck を表示します。
      state.activeIndex = 0;
      state.confirmedCards = [];
      state.view = "deck";
      render();
    }

    async function showPostMindsetMessage() {
      const stamp = findSpecialStamp("2026-04-29");
      if (stamp && stamp.message) {
        await showTypewriterModal(stamp.title, stamp.message, "インプット");
        if (isCheatDay()) {
          await showCheatDayAnnouncement();
        }
      }
      state.view = "home";
      render();
    }

    function showModal(title, message, actions = [{ label: "OK", value: "ok", style: "primary-button" }]) {
      // 汎用確認モーダルです。クリックイベントは Promise 解決時に必ず外し、modalRoot を空にする前提で他のモーダルと共有しています。
      modalRoot.innerHTML = `
        <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
          <h2 id="modalTitle">${escapeHTML(title)}</h2>
          <p>${escapeHTML(message)}</p>
          <div class="${actions.length > 1 ? "button-row" : "stack"}">
            ${actions.map((action) => `
              <button class="${escapeHTML(action.style || "secondary-button")}" type="button" data-modal-action="${escapeHTML(action.value)}">${escapeHTML(action.label)}</button>
            `).join("")}
          </div>
        </section>
      `;
      modalRoot.classList.add("is-open");
      const firstButton = modalRoot.querySelector("button");
      if (firstButton) firstButton.focus();

      return new Promise((resolve) => {
        const onClick = (event) => {
          const button = event.target.closest("[data-modal-action]");
          if (!button) return;
          modalRoot.classList.remove("is-open");
          modalRoot.innerHTML = "";
          modalRoot.removeEventListener("click", onClick);
          resolve(button.dataset.modalAction);
        };
        modalRoot.addEventListener("click", onClick);
      });
    }

    function showCheatDayAnnouncement() {
      // 完了画面の特別メッセージ後、当日が解禁日の場合だけ出す案内です。虫眼鏡ボタンは CHEAT_DAY_URL を別タブで開きます。
      modalRoot.innerHTML = `
        <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
          <h2 id="modalTitle">本日、禁欲解禁日です。</h2>
          <p class="cheat-announcement-text">指定ページを開く場合は虫眼鏡を押してください。</p>
          <div class="cheat-actions">
            <button class="cheat-url-button" type="button" data-modal-action="open-cheat-day-url" title="指定URLを開く" aria-label="指定URLを開く">🔍</button>
            <button class="secondary-button" type="button" data-modal-action="ok" style="width: auto;">閉じる</button>
          </div>
        </section>
      `;
      modalRoot.classList.add("is-open");
      const firstButton = modalRoot.querySelector("button");
      if (firstButton) firstButton.focus();

      return new Promise((resolve) => {
        const onClick = (event) => {
          const button = event.target.closest("[data-modal-action]");
          if (!button) return;
          const action = button.dataset.modalAction;
          if (action === "open-cheat-day-url") {
            openCheatDayUrl();
          }
          modalRoot.classList.remove("is-open");
          modalRoot.innerHTML = "";
          modalRoot.removeEventListener("click", onClick);
          resolve(action);
        };
        modalRoot.addEventListener("click", onClick);
      });
    }

    function addYesterdayCorrection(value, countStr) {
      const dateKey = addDaysToKey(todayKey(), -1);
      if (hasAnyStampForDate(dateKey)) return false;

      const isCross = value === "cross";
      const label = isCross ? `自慰${countStr || "1"}回` : "修正記入";
      const completedAtDate = dateKeyToDate(dateKey);
      completedAtDate.setHours(12, 0, 0, 0);
      const history = getHistory();
      history.unshift({
        id: `${Date.now()}-yesterday-${value}`,
        mode: `前日修正（${label}）`,
        count: 0,
        completedAt: completedAtDate.toISOString(),
        dateKey,
        correctionMark: isCross ? "×" : "○",
        correctionLabel: label,
        correctionTone: isCross ? "warning" : "",
        cards: []
      });
      return saveJSON(STORAGE_KEYS.history, history.slice(0, 180));
    }

    async function repairYesterday() {
      const dateKey = addDaysToKey(todayKey(), -1);
      if (hasAnyStampForDate(dateKey)) {
        await showModal("前日の記入漏れ修正", "昨日の記録は存在します");
        return;
      }

      const result = await showModal("前日の記入漏れ修正", "前日分として追加する記録を選んでください。", [
        { label: "丸", value: "circle", style: "primary-button" },
        { label: "バツ", value: "cross", style: "danger-button" }
      ]);

      if (result !== "circle" && result !== "cross") return;

      if (result === "cross") {
        setTimeout(() => {
          const count = window.prompt("何回でしたか？", "1");
          if (count !== null && count.trim() !== "") {
            if (addYesterdayCorrection(result, count.trim())) {
              showModal("記録しました", "前日分の記録を追加しました。").then(render);
            }
          }
        }, 10);
      } else {
        if (addYesterdayCorrection(result)) {
          await showModal("記録しました", "前日分の記録を追加しました。");
          render();
        }
      }
    }

    async function showTypewriterModal(title, text, buttonLabel = "閉じる") {
      // 長文を 1 文字ずつ表示する専用モーダルです。許可している装飾は <u>...</u> の下線だけで、通常の HTML 挿入ではありません。
      modalRoot.innerHTML = `
        <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
          <h2 id="modalTitle">${escapeHTML(title)}</h2>
          <div class="modal-body-scroll" id="typewriterBody"></div>
          <div class="stack" id="modalActions" style="visibility: hidden;">
            <button class="primary-button" type="button" data-modal-action="ok">${escapeHTML(buttonLabel)}</button>
          </div>
        </section>
      `;
      modalRoot.classList.add("is-open");
      const body = modalRoot.querySelector("#typewriterBody");
      const actions = modalRoot.querySelector("#modalActions");

      let isSkipped = false;
      const handleSkip = () => { isSkipped = true; };
      modalRoot.addEventListener("click", handleSkip, { once: true });

      // メッセージのパース（<u>タグを抽出）。閉じタグ欠落時も残りを下線扱いにして表示を止めないようにしています。
      const tokens = [];
      let tempText = text;
      while (tempText) {
        if (tempText.startsWith("<u>")) {
          const endIdx = tempText.indexOf("</u>");
          if (endIdx !== -1) {
            tokens.push({ text: tempText.substring(3, endIdx), underlined: true });
            tempText = tempText.substring(endIdx + 4);
          } else {
            tokens.push({ text: tempText.substring(3), underlined: true });
            tempText = "";
          }
        } else {
          const nextTag = tempText.indexOf("<u>");
          if (nextTag !== -1) {
            tokens.push({ text: tempText.substring(0, nextTag), underlined: false });
            tempText = tempText.substring(nextTag);
          } else {
            tokens.push({ text: tempText, underlined: false });
            tempText = "";
          }
        }
      }

      const renderCurrent = (charList) => {
        body.innerHTML = "";
        let currentSpan = null;
        charList.forEach(item => {
          if (item.underlined) {
            if (!currentSpan || !currentSpan.classList.contains("message-underline")) {
              currentSpan = document.createElement("span");
              currentSpan.className = "message-underline";
              body.appendChild(currentSpan);
            }
            currentSpan.textContent += item.char;
          } else {
            currentSpan = null;
            if (item.char === "\n") {
              body.appendChild(document.createElement("br"));
            } else {
              body.appendChild(document.createTextNode(item.char));
            }
          }
        });
        body.scrollTop = body.scrollHeight;
      };

      const allChars = [];
      tokens.forEach(token => {
        [...token.text].forEach(char => {
          allChars.push({ char, underlined: token.underlined });
        });
      });

      for (let i = 0; i < allChars.length; i++) {
        if (isSkipped) {
          renderCurrent(allChars);
          break;
        }

        renderCurrent(allChars.slice(0, i + 1));
        const char = allChars[i].char;
        let delay = 35;
        if (char === "。" || char === "！" || char === "？") delay = 450;
        else if (char === "、") delay = 180;
        else if (char === "\n") delay = 300;

        await new Promise(resolve => setTimeout(resolve, delay));
      }

      modalRoot.removeEventListener("click", handleSkip);
      actions.style.visibility = "visible";
      const btn = actions.querySelector("button");
      if (btn) btn.focus();

      return new Promise((resolve) => {
        const onClick = (event) => {
          const button = event.target.closest("[data-modal-action]");
          if (!button) return;
          modalRoot.classList.remove("is-open");
          modalRoot.innerHTML = "";
          modalRoot.removeEventListener("click", onClick);
          resolve();
        };
        modalRoot.addEventListener("click", onClick);
      });
    }

    app.addEventListener("submit", (event) => {
      // フォーム送信はロック解除だけです。認証成功時のみ localStorage に保存し、失敗時は進捗を破棄します。
      const form = event.target.closest("form");
      if (!form) return;
      event.preventDefault();

      if (form.dataset.form === "unlock") {
        const password = String(new FormData(form).get("password") || "").trim();
        const expected = AUTH_SEQUENCE[state.unlockStep];

        if (password === expected) {
          if (state.unlockStep + 1 >= AUTH_SEQUENCE.length) {
            resetUnlockProgress();
            state.authenticated = true;
            localStorage.setItem(STORAGE_KEYS.authenticated, "true");
            state.view = "home";
            render();
            return;
          }

          state.unlockStep += 1;
          renderLock();
        } else {
          resetUnlockProgress();
          renderLock();
          showModal("開けませんでした", "順番が違います。1段階目からやり直してください。");
        }
      }

    });

    app.addEventListener("pointerdown", handlePointerFeedback);
    modalRoot.addEventListener("pointerdown", handlePointerFeedback);


    let longPressTimer = null;
    let longPressTarget = null;
    let pointerStartX = 0;
    let pointerStartY = 0;

    function getCoords(e) {
      if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    function onPointerDown(e) {
      if (e.button && e.button !== 0) return;
      const target = e.target.closest('[data-editable-id]');
      if (!target) return;
      
      const coords = getCoords(e);
      pointerStartX = coords.x;
      pointerStartY = coords.y;
      longPressTarget = target;
      
      longPressTimer = window.setTimeout(() => {
        handleLongPress(target);
        cancelLongPress();
      }, 700);
    }

    function onPointerMove(e) {
      if (!longPressTimer) return;
      const coords = getCoords(e);
      if (Math.abs(coords.x - pointerStartX) > 10 || Math.abs(coords.y - pointerStartY) > 10) {
        cancelLongPress();
      }
    }

    function cancelLongPress() {
      if (longPressTimer) {
        window.clearTimeout(longPressTimer);
        longPressTimer = null;
      }
      longPressTarget = null;
    }

    function handleLongPress(target) {
      const id = target.getAttribute('data-editable-id');
      if (!id) return;
      
      setTimeout(() => {
        if (window.confirm("バツに変更しますか？")) {
          setTimeout(() => {
            const count = window.prompt("何回でしたか？", "1");
            if (count !== null && count.trim() !== "") {
              const history = getHistory();
              const index = history.findIndex(item => item.id === id);
              if (index !== -1) {
                history[index].correctionMark = "×";
                history[index].correctionLabel = `自慰${count.trim()}回`;
                history[index].correctionTone = "warning";
                saveJSON(STORAGE_KEYS.history, history.slice(0, 180));
                render();
              }
            }
          }, 10);
        }
      }, 10);
    }

    app.addEventListener("touchstart", onPointerDown, { passive: true });
    app.addEventListener("touchmove", onPointerMove, { passive: true });
    app.addEventListener("touchend", cancelLongPress, { passive: true });
    app.addEventListener("touchcancel", cancelLongPress, { passive: true });
    app.addEventListener("mousedown", onPointerDown, { passive: true });
    app.addEventListener("mousemove", onPointerMove, { passive: true });
    app.addEventListener("mouseup", cancelLongPress, { passive: true });

    app.addEventListener("click", async (event) => {
      // 全ボタン操作のルーティングです。data-action 名を変えるとテンプレート側のボタンが無反応になります。
      const actionTarget = event.target.closest("[data-action]");
      if (!actionTarget || actionTarget.disabled) return;
      const action = actionTarget.dataset.action;
      if (!action) return;

      if (action === "go") {
        state.view = actionTarget.dataset.view || "home";
        state.transitioning = false;
        render();
      }

      if (action === "expand-stamp-month") {
        const monthKey = actionTarget.dataset.month;
        if (monthKey) state.expandedStampMonths.add(monthKey);
        render();
      }

      if (action === "toggle-image") {
        await toggleFocusImage();
      }

      if (action === "start-run") {
        startRun();
      }

      if (action === "open-calendar") {
        state.view = "calendar";
        state.transitioning = false;
        render();
      }

      if (action === "open-cheat-day-url") {
        openCheatDayUrl();
      }

      if (action === "open-bgm-video-url") {
        openBgmVideoUrl();
      }

      if (action === "confirm-card") {
        confirmCard();
      }

      if (action === "backup-data") {
        backupData();
      }

      if (action === "repair-yesterday") {
        await repairYesterday();
      }

      if (action === "show-special-message") {
        const id = actionTarget.dataset.id;
        const stamp = findSpecialStamp(id);
        if (stamp && stamp.message) {
          const shouldAnnounceCheatDay = actionTarget.dataset.announceCheatDay === "true";
          await showTypewriterModal(stamp.title, stamp.message, shouldAnnounceCheatDay ? "インプット" : "閉じる");
          if (shouldAnnounceCheatDay && isCheatDay()) {
            await showCheatDayAnnouncement();
          }
          state.view = "home";
          render();
        }
      }

      if (action === "lock-reset") {
        // 認証リセットは authenticated キーだけを消します。履歴・カード・画像選択は削除対象ではありません。
        const result = await showModal("認証状態をリセットしますか", "次回からもう一度パスワード入力が必要になります。", [
          { label: "やめる", value: "cancel", style: "secondary-button" },
          { label: "リセット", value: "reset", style: "danger-button" }
        ]);
        if (result === "reset") {
          localStorage.removeItem(STORAGE_KEYS.authenticated);
          state.authenticated = false;
          resetUnlockProgress();
          state.view = "home";
          render();
        }
      }
    });

    // 初期描画。以後の画面切り替えも render() 経由に統一します。
    render();
  </script>
</body>
</html>
